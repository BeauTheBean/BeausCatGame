<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>BeausCatGame</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #unity-container { position: absolute; width: 100%; height: 100%; }
    #unity-canvas { width: 100%; height: 100%; background: black; }
    #unity-loading-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
</div>

<script>
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");

  // 🔥 CHANGE THIS IF YOU UPLOAD TO DIFFERENT HOST
  const buildUrl = "Build";

  const loaderUrl = buildUrl + "/BeausCatGame.loader.js";

  const config = {
    dataUrl: buildUrl + "/BeausCatGame.data",
    frameworkUrl: buildUrl + "/BeausCatGame.framework.js",
    codeUrl: buildUrl + "/BeausCatGame.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "BeausCatGame",
    productName: "BeausCatGame",
    productVersion: "0.1"
  };

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {

      loadingBar.style.display = "none";

    }).catch((message) => {
      console.error(message);
      alert(message);
    });
  };

  script.onerror = () => {
    alert("Failed to load Unity loader.js");
  };

  document.body.appendChild(script);
</script>

</body>
</html>
